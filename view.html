<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Letters</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(150deg, #fde8ee 0%, #f0edfa 45%, #e8f7f0 100%);
      font-family: 'Lora', serif;
      color: #3d2b1f;
      padding: 2.5rem 1rem 5rem;
    }

    .wrapper { max-width: 640px; margin: 0 auto; }

    h1 {
      font-family: 'Caveat', cursive;
      font-size: 2.4rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      color: #8a6a5e;
      text-align: center;
      margin-bottom: 0.75rem;
    }

    /* Password gate */
    #gate {
      background: #fffaf3;
      border-radius: 20px;
      padding: 2rem;
      max-width: 380px;
      margin: 2rem auto 0;
      box-shadow: 0 6px 28px rgba(61,43,31,0.1);
      text-align: center;
    }
    #gate p {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      color: #8a6a5e;
      margin-bottom: 1rem;
    }
    #gate input {
      font-family: 'Caveat', cursive;
      font-size: 1.15rem;
      color: #3d2b1f;
      background: #fef3e2;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 0.65rem 0.9rem;
      width: 100%;
      outline: none;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }
    #gate input:focus { border-color: #f9c4d0; }
    #gate button {
      font-family: 'Caveat', cursive;
      font-size: 1.15rem;
      font-weight: 700;
      color: #3d2b1f;
      background: linear-gradient(135deg, #f9c4d0, #ddd6f3);
      border: none;
      border-radius: 50px;
      padding: 0.7rem 2rem;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 3px 12px rgba(249,196,208,0.4);
    }
    #gate-error {
      font-family: 'Caveat', cursive;
      font-size: 0.95rem;
      color: #c0504d;
      margin-top: 0.5rem;
      display: none;
    }

    /* Letters list */
    #letters-view { display: none; }
    .count {
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      color: #8a6a5e;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .letter-card {
      background: #fffaf3;
      border-radius: 16px;
      padding: 1.5rem 1.75rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 4px 20px rgba(61,43,31,0.1);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    .letter-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #f9c4d0, #ddd6f3, #c8ecd9);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .letter-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.25rem;
    }
    .letter-name { font-family: 'Caveat', cursive; font-size: 1.3rem; font-weight: 700; }
    .letter-date { font-family: 'Caveat', cursive; font-size: 0.9rem; color: #8a6a5e; }
    .letter-msg  { font-family: 'Caveat', cursive; font-size: 1.2rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }

    .empty {
      text-align: center;
      font-family: 'Caveat', cursive;
      font-size: 1.3rem;
      color: #8a6a5e;
      margin-top: 3rem;
    }
    #error-msg {
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      color: #c0504d;
      text-align: center;
      margin-top: 2rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>&#x1F4EC; All Letters</h1>
    <p class="subtitle">every note left behind</p>

    <!-- Password gate -->
    <div id="gate">
      <p>Enter the view password to see all letters</p>
      <input type="password" id="pw-input" placeholder="password..." autocomplete="current-password">
      <button id="pw-btn">open the mailbox</button>
      <div id="gate-error">wrong password</div>
    </div>

    <!-- Letters view -->
    <div id="letters-view">
      <div id="count" class="count"></div>
      <div id="letters"></div>
      <div id="error-msg"></div>
    </div>
  </div>

  <script type="module">
    // ── CONFIG ────────────────────────────────────────────────────────────────
    const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY  = 'YOUR_SUPABASE_ANON_KEY';
    const VIEW_PASSWORD = 'YOUR_VIEW_PASSWORD';  // choose any password
    // ─────────────────────────────────────────────────────────────────────────

    document.getElementById('pw-btn').addEventListener('click', () => {
      const pw = document.getElementById('pw-input').value;
      if (pw === VIEW_PASSWORD) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('letters-view').style.display = 'block';
        loadLetters();
      } else {
        document.getElementById('gate-error').style.display = 'block';
        setTimeout(() => { document.getElementById('gate-error').style.display = 'none'; }, 2000);
      }
    });

    document.getElementById('pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('pw-btn').click();
    });

    async function loadLetters() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/letters?select=*&order=created_at.desc`,
          {
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
            },
          }
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const letters = await res.json();

        const countEl    = document.getElementById('count');
        const container  = document.getElementById('letters');

        if (!letters.length) {
          container.innerHTML = '<p class="empty">no letters yet... &#x2665;</p>';
          return;
        }

        countEl.textContent = `${letters.length} letter${letters.length === 1 ? '' : 's'}`;

        letters.forEach((l, i) => {
          const card = document.createElement('div');
          card.className = 'letter-card';
          card.style.animationDelay = `${i * 0.06}s`;

          const date = new Date(l.created_at).toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric',
            hour: '2-digit', minute: '2-digit',
          });

          card.innerHTML = `
            <div class="letter-meta">
              <span class="letter-name">${esc(l.name)}</span>
              <span class="letter-date">${date}</span>
            </div>
            <div class="letter-msg">${esc(l.message)}</div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        const el = document.getElementById('error-msg');
        el.style.display = 'block';
        el.textContent = 'Could not load letters: ' + err.message;
      }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
