[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/submit"
  to = "/.netlify/functions/submit"
  status = 200

[[redirects]]
  from = "/api/letters"
  to = "/.netlify/functions/letters"
  status = 200

[[redirects]]
  from = "/api/random-letter"
  to = "/.netlify/functions/random-letter"
  status = 200
